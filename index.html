<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Music Experience</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:black;
color:white;
position:relative;
}

.background{
position:fixed;
inset:0;
background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop') center/cover;
filter:blur(22px) brightness(0.22);
transform:scale(1.12);
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,.82),rgba(0,0,0,.52));
}

.container{
position:relative;
z-index:2;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
padding:5vw;
gap:6vw;
}

.left{
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.vinyl{
width:34vw;
max-width:360px;
aspect-ratio:1/1;
border-radius:50%;
background:
radial-gradient(circle at center,#111 0%,#000 58%,#151515 70%,#000 100%);
box-shadow:0 0 80px rgba(0,0,0,.7);
animation:spin 8s linear infinite;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.vinyl::before{
content:'';
position:absolute;
inset:14px;
border-radius:50%;
border:2px solid rgba(255,255,255,.05);
}

.vinyl::after{
content:'';
position:absolute;
width:18px;
height:18px;
background:#d9d9d9;
border-radius:50%;
z-index:3;
}

.album-cover{
width:45%;
height:45%;
border-radius:50%;
overflow:hidden;
position:relative;
z-index:2;
}

.album-cover img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.right{
flex:1;
max-width:540px;
height:70vh;
overflow:hidden;
position:relative;
}

.song-title{
font-size:clamp(28px,4vw,54px);
font-weight:700;
margin-bottom:12px;
text-shadow:0 0 25px rgba(255,255,255,.18);
}

.artist{
font-size:18px;
opacity:.72;
margin-bottom:35px;
}

.lyric-box{
height:50vh;
overflow:hidden;
position:relative;
mask-image:linear-gradient(to bottom,transparent 0%,white 15%,white 85%,transparent 100%);
}

.lyrics{
font-size:22px;
line-height:2.2;
text-shadow:
0 0 10px rgba(255,255,255,.5),
0 0 25px rgba(255,255,255,.25);
animation:scrollLyrics 24s linear infinite;
}

@keyframes scrollLyrics{
0%{transform:translateY(100%)}
100%{transform:translateY(-100%)}
}

.tip{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);
padding:14px 24px;
border-radius:999px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(14px);
font-size:13px;
letter-spacing:2px;
opacity:0;
transition:.35s;
z-index:5;
}

.tip.show{
opacity:1;
}

@media(max-width:900px){
.container{
flex-direction:column;
padding-top:8vh;
gap:40px;
}

.vinyl{
width:78vw;
max-width:320px;
}

.right{
width:100%;
height:42vh;
text-align:center;
}

.lyrics{
font-size:18px;
line-height:2;
}
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

<div class="left">
<div class="vinyl">
<div class="album-cover">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200&auto=format&fit=crop">
</div>
</div>
</div>

<div class="right">
<div class="song-title">寂寞的人伤心的歌</div>
<div class="artist">DELTA COFFEE VINYL EXPERIENCE</div>

<div class="lyric-box">
<div class="lyrics">
寂寞的人唱着伤心的歌<br><br>
凌晨的城市只剩霓虹和我<br><br>
风吹过耳机里的回忆<br><br>
像黑胶唱针划过旧生活<br><br>
夜色慢慢沉入咖啡香气<br><br>
时间像烟雾一样漂浮
<br><br>
窗外雨声和旋律重叠
<br><br>
孤独的人还在循环播放<br><br>
所有情绪坠进凌晨三点<br><br>
像航大红咖啡豆般浓烈
<br><br>
你离开的背影渐渐模糊
<br><br>
而音乐还没有结束
</div>
</div>

</div>

</div>

</div>

<div class="tip" id="tip">TAP ANYWHERE TO PLAY MUSIC</div>

<audio id="music" autoplay loop playsinline webkit-playsinline>
<source src="M500002sDgOx30N1dj.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById('music');
const tip = document.getElementById('tip');

async function autoPlay(){

try{

music.muted = false;
await music.play();

}catch(err){

music.muted = true;

try{
await music.play();
}catch(e){}

music.pause();

setTimeout(()=>{
tip.classList.add('show');
},500);

}
}

autoPlay();

function startMusic(){
music.muted = false;
music.play();
tip.classList.remove('show');
}

document.body.addEventListener('click',startMusic);
</script>

</body>
</html>
